<!DOCTYPE html>
<html>
<head>
    <title>Test Razorpay Payment</title>
    <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 500px;
            margin: 60px auto;
            padding: 20px;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 6px 0 14px 0;
            box-sizing: border-box;
        }
        button {
            padding: 12px 24px;
            background: #3399cc;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #2980a9;
        }
        label {
            font-weight: bold;
            font-size: 14px;
        }
    </style>
</head>
<body>
<h2>Test Razorpay Payment</h2>
<p>Fill in the values from your <code>POST /api/payments/create/{orderId}</code> response, then click Pay Now.</p>

<label>Razorpay Key ID</label>
<input type="text" id="keyId" placeholder="rzp_test_xxxxxxxxxxxxx">

<label>Amount (in paise, e.g. 80000 rupees = 8000000)</label>
<input type="number" id="amount" placeholder="8000000">

<label>Razorpay Order ID</label>
<input type="text" id="orderId" placeholder="order_xxxxxxxxxxxxx">

<button id="payBtn">Pay Now</button>

<div id="result" style="margin-top: 20px; white-space: pre-wrap; font-family: monospace; background: #f4f4f4; padding: 12px; border-radius: 4px;"></div>

<script>
    document.getElementById('payBtn').onclick = function () {
        var keyId = document.getElementById('keyId').value.trim();
        var amount = document.getElementById('amount').value.trim();
        var orderId = document.getElementById('orderId').value.trim();

        if (!keyId || !amount || !orderId) {
            alert('Please fill in all three fields first.');
            return;
        }

        var options = {
            "key": keyId,
            "amount": amount,
            "currency": "INR",
            "order_id": orderId,
            "name": "Learn Spring Boot Store",
            "description": "Test Transaction",
            "handler": function (response) {
                var output =
                    "Payment ID: " + response.razorpay_payment_id + "\n" +
                    "Order ID: " + response.razorpay_order_id + "\n" +
                    "Signature: " + response.razorpay_signature;
                document.getElementById('result').innerText = output;
                console.log(response);
            },
            "modal": {
                "ondismiss": function () {
                    document.getElementById('result').innerText = "Payment popup closed without completing.";
                }
            },
            "theme": { "color": "#3399cc" }
        };

        var rzp = new Razorpay(options);
        rzp.on('payment.failed', function (response) {
            document.getElementById('result').innerText = "Payment FAILED: " + JSON.stringify(response.error);
        });
        rzp.open();
    };
</script>
</body>
</html>
